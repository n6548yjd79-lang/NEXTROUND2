<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>NEXTROUND</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080b10;
      --panel: #111821;
      --panel-2: #172231;
      --line: rgba(255,255,255,.1);
      --text: #f3f7fb;
      --muted: #95a3b5;
      --blue: #4bb3fd;
      --green: #36d399;
      --amber: #ffcf5a;
      --red: #ff6678;
      --violet: #b79cff;
      --cyan: #61f4de;
      --ink: #05070b;
      --shadow: 0 18px 60px rgba(0,0,0,.35);
      --shadow-strong: 0 24px 90px rgba(0,0,0,.52);
      --radius: 8px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(145deg, rgba(75,179,253,.17), transparent 28%),
        linear-gradient(25deg, rgba(255,207,90,.075), transparent 42%),
        linear-gradient(180deg, rgba(255,255,255,.035), transparent 18%),
        var(--bg);
      color: var(--text);
      letter-spacing: 0;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size: 38px 38px;
      mask-image: linear-gradient(180deg, rgba(0,0,0,.48), transparent 54%);
    }

    button, input, select, textarea { font: inherit; }

    button {
      transition: transform .16s ease, border-color .16s ease, background .16s ease, opacity .16s ease;
    }

    button:active {
      transform: scale(.98);
    }

    .app {
      width: min(100%, 920px);
      margin: 0 auto;
      padding: 18px 14px 112px;
      position: relative;
    }

    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 2px 20px;
    }

    .brand {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 8vw, 46px);
      line-height: .95;
      font-weight: 850;
      background: linear-gradient(95deg, #f9fcff, var(--blue) 48%, var(--cyan));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .sub {
      margin: 0;
      color: #d2d9e4;
      font-size: clamp(10px, 2.9vw, 13px);
      font-weight: 650;
      white-space: nowrap;
    }

    .today {
      min-width: 86px;
      padding: 10px 11px;
      border: 1px solid rgba(255,255,255,.14);
      background: linear-gradient(180deg, rgba(255,255,255,.105), rgba(255,255,255,.045));
      border-radius: 14px;
      text-align: right;
      color: #d5deea;
      font-size: 12px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
    }

    .today strong {
      display: block;
      color: var(--text);
      font-size: 19px;
      line-height: 1.1;
    }

    .today small {
      display: block;
      margin-top: 2px;
      color: #d2d9e4;
      font-size: 11px;
      font-weight: 750;
    }

    .header-tools {
      display: flex;
      align-items: stretch;
      gap: 7px;
      flex: 0 0 auto;
    }

    .settings-btn {
      min-width: 50px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 14px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.105), rgba(255,255,255,.045)),
        rgba(255,255,255,.045);
      color: #eef4fb;
      font-size: 12px;
      font-weight: 900;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
    }

    .settings-btn:focus-visible {
      outline: 3px solid rgba(75,179,253,.34);
      outline-offset: 2px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat {
      padding: 13px 12px;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 12px;
      background:
        linear-gradient(180deg, rgba(30,39,52,.94), rgba(12,18,26,.94)),
        rgba(255,255,255,.04);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .stat::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 2px;
      background: var(--accent, #7aa7ff);
      opacity: .95;
    }

    .stat-active { --accent: #7aa7ff; }
    .stat-deadline { --accent: #9f1f2f; }
    .stat-win { --accent: #c99a33; }

    .stat-deadline strong { color: #ff8b99; }
    .stat-win strong { color: #ffdf72; }

    .stat span {
      display: block;
      color: #eef4fb;
      font-size: 12px;
      white-space: nowrap;
      font-weight: 850;
      text-shadow: 0 1px 6px rgba(0,0,0,.45);
    }

    .stat strong {
      display: block;
      margin-top: 4px;
      font-size: 24px;
      line-height: 1;
      color: #ffffff;
      text-shadow: 0 1px 8px rgba(0,0,0,.5);
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: grid;
      gap: 10px;
      padding: 10px 0 14px;
      background: linear-gradient(180deg, rgba(8,11,16,.98) 0%, rgba(8,11,16,.92) 72%, transparent 100%);
      backdrop-filter: blur(14px);
    }

    .search {
      width: 100%;
      min-height: 48px;
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 14px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.065)),
        rgba(255,255,255,.08);
      color: var(--text);
      padding: 0 15px;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
    }

    .search::placeholder {
      color: #9facbd;
      opacity: 1;
    }

    .search:focus {
      border-color: rgba(75,179,253,.56);
      box-shadow: 0 0 0 3px rgba(75,179,253,.14), inset 0 1px 0 rgba(255,255,255,.06);
    }

    .chips {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }

    .chips::-webkit-scrollbar { display: none; }

    .chip {
      flex: 0 0 auto;
      min-height: 36px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 999px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.13), rgba(255,255,255,.055)),
        rgba(255,255,255,.065);
      color: #eef3f9;
      padding: 0 13px;
      font-weight: 800;
    }

    .chip.active {
      color: #061018;
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      border-color: transparent;
      font-weight: 800;
      box-shadow: 0 8px 24px rgba(75,179,253,.2);
    }

    .deadline-strip {
      display: grid;
      gap: 8px;
      margin: 2px 0 14px;
    }

    .deadline-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 13px;
      border: 1px solid rgba(255,207,90,.32);
      border-radius: 12px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.16), transparent 26%),
        linear-gradient(90deg, rgba(255,207,90,.16), rgba(255,207,90,.045));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.05);
    }

    .deadline-card.deadline-critical {
      border-color: rgba(177, 28, 46, .86);
      background:
        linear-gradient(135deg, rgba(255,255,255,.12), transparent 25%),
        linear-gradient(90deg, rgba(116, 14, 28, .62), rgba(55, 8, 17, .38));
      box-shadow: 0 0 0 1px rgba(255,102,120,.12), 0 14px 40px rgba(116,14,28,.22);
    }

    .deadline-card.deadline-soon {
      border-color: rgba(211, 122, 30, .86);
      background:
        linear-gradient(135deg, rgba(255,255,255,.12), transparent 25%),
        linear-gradient(90deg, rgba(135, 70, 18, .54), rgba(61, 32, 12, .34));
      box-shadow: 0 0 0 1px rgba(255,168,72,.12), 0 14px 40px rgba(135,70,18,.18);
    }

    .deadline-card b { font-size: 14px; overflow-wrap: anywhere; }
    .deadline-card span { color: var(--amber); font-weight: 800; white-space: nowrap; }

    .deadline-card.deadline-critical span { color: #ff9aa6; }
    .deadline-card.deadline-soon span { color: #ffbd72; }

    .cards {
      display: grid;
      gap: 14px;
    }

    .card {
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 16px;
      background:
        linear-gradient(180deg, rgba(28,39,55,.98), rgba(10,15,23,.99)),
        rgba(255,255,255,.04);
      box-shadow: var(--shadow-strong);
      overflow: hidden;
      position: relative;
      isolation: isolate;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 3px;
      background: linear-gradient(90deg, var(--stage-color, var(--blue)), transparent 74%);
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: 15px;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(255,255,255,.11), transparent 18%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.1);
      opacity: .42;
    }

    .card.win {
      border-color: rgba(255,207,90,.72);
      background:
        linear-gradient(135deg, rgba(255,255,255,.2), transparent 24%),
        linear-gradient(135deg, rgba(255,207,90,.13), transparent 34%),
        linear-gradient(180deg, rgba(27,31,29,.98), rgba(9,14,17,.99));
      box-shadow: 0 18px 58px rgba(255,207,90,.12), 0 16px 50px rgba(0,0,0,.44);
    }

    .card.win::before {
      height: 4px;
      background: linear-gradient(90deg, #ffdf72, #c9982c, #ffdf72);
    }

    .card.deadline-critical {
      border-color: rgba(177, 28, 46, .9);
      box-shadow: 0 0 0 1px rgba(255,102,120,.16), 0 22px 70px rgba(116,14,28,.26), 0 20px 60px rgba(0,0,0,.48);
    }

    .card.deadline-critical::before {
      height: 4px;
      background: #9f1f2f;
    }

    .card.deadline-soon {
      border-color: rgba(211, 122, 30, .86);
      box-shadow: 0 0 0 1px rgba(255,168,72,.14), 0 22px 70px rgba(135,70,18,.2), 0 20px 60px rgba(0,0,0,.48);
    }

    .card.deadline-soon::before {
      height: 4px;
      background: #d37a1e;
    }

    .card-main {
      padding: 16px;
      display: grid;
      gap: 13px;
    }

    .topline {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .company {
      min-width: 0;
    }

    .company h2 {
      margin: 0 0 5px;
      font-size: 21px;
      line-height: 1.2;
      overflow-wrap: anywhere;
      text-shadow: 0 1px 8px rgba(0,0,0,.45);
    }

    .company p {
      margin: 0;
      color: #d0d8e4;
      font-size: 13px;
      font-weight: 650;
      overflow-wrap: anywhere;
    }

    .type {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      border: 1px solid color-mix(in srgb, var(--stage-color, var(--blue)) 38%, transparent);
      color: var(--stage-color, var(--blue));
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
      background: rgba(255,255,255,.055);
    }

    .stage-row {
      display: grid;
      gap: 8px;
    }

    .stage-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: #d0d8e4;
      font-size: 12px;
    }

    .stage-label strong {
      color: var(--stage-color, var(--text));
      font-size: 14px;
      text-shadow: 0 1px 8px rgba(0,0,0,.45);
    }

    .track {
      height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,.105);
      overflow: hidden;
      box-shadow: inset 0 1px 2px rgba(0,0,0,.45);
    }

    .bar {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--stage-color, var(--green)), var(--blue));
      width: 0;
    }

    .meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
    }

    .meta-box {
      min-height: 58px;
      padding: 10px 11px;
      border: 1px solid rgba(255,255,255,.105);
      border-radius: 12px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.028)),
        rgba(255,255,255,.045);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
    }

    .meta-box span {
      display: block;
      color: #cbd4e0;
      font-size: 11px;
      font-weight: 750;
    }

    .meta-box b {
      display: block;
      margin-top: 3px;
      font-size: 14px;
      line-height: 1.35;
      overflow-wrap: anywhere;
      text-shadow: 0 1px 8px rgba(0,0,0,.4);
    }

    .urgent b { color: var(--red); }
    .soon b { color: var(--amber); }

    .deadline-critical .urgent b {
      color: #ff8c99;
    }

    .deadline-soon .soon b {
      color: #ffbd72;
    }

    .countdown {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      min-height: 26px;
      margin-top: 7px;
      padding: 0 9px;
      border-radius: 999px;
      background: rgba(255,207,90,.12);
      color: var(--amber);
      border: 1px solid rgba(255,207,90,.2);
      font-size: 12px;
      font-style: normal;
      font-weight: 950;
    }

    .countdown.danger {
      background: rgba(159,31,47,.24);
      color: #ff9aa6;
      border-color: rgba(255,102,120,.38);
    }

    .countdown.warning {
      background: rgba(211,122,30,.2);
      color: #ffbd72;
      border-color: rgba(255,168,72,.34);
    }

    .schedule-box {
      border-color: rgba(255,207,90,.34);
      background:
        linear-gradient(180deg, rgba(255,207,90,.12), rgba(255,255,255,.03)),
        rgba(255,255,255,.045);
    }

    .schedule-box b {
      color: #ffe6a6;
      white-space: pre-wrap;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--stage-color, var(--blue)) 18%, transparent);
      border: 1px solid color-mix(in srgb, var(--stage-color, var(--blue)) 34%, transparent);
      color: var(--stage-color, var(--blue));
      font-size: 12px;
      font-weight: 900;
    }

    .card.win .status-pill {
      color: #ffdf72;
      border-color: rgba(255,207,90,.44);
      background: rgba(255,207,90,.14);
    }

    .actions {
      display: grid;
      grid-template-columns: minmax(120px, 1.2fr) minmax(84px, .9fr) 66px 66px;
      gap: 8px;
      border-top: 1px solid rgba(255,255,255,.1);
      padding: 10px;
      background: linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.025));
    }

    .actions.result-mode {
      grid-template-columns: minmax(130px, 1fr) 66px 66px;
    }

    [hidden] {
      display: none !important;
    }

    .primary, .quick, .icon-btn {
      border: 0;
      min-height: 44px;
      border-radius: 12px;
      cursor: pointer;
    }

    .primary {
      background: linear-gradient(135deg, var(--green), #75e6ad);
      color: #04130e;
      font-weight: 900;
      box-shadow: 0 10px 24px rgba(54,211,153,.18);
      position: relative;
      overflow: hidden;
    }

    .primary.done {
      background: rgba(255,255,255,.08);
      color: #d5deea;
      box-shadow: none;
    }

    .primary::before,
    .fab::before {
      content: "";
      position: absolute;
      inset: 1px 1px auto;
      height: 44%;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(255,255,255,.28), rgba(255,255,255,0));
      pointer-events: none;
      opacity: .32;
    }

    .primary.done::before {
      opacity: .12;
    }

    .quick {
      background:
        linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.025)),
        rgba(255,207,90,.16);
      color: var(--amber);
      font-weight: 900;
      border: 1px solid rgba(255,207,90,.12);
    }

    .quick.active {
      background: rgba(255,207,90,.27);
      color: #ffe7a3;
      border: 1px solid rgba(255,207,90,.28);
    }

    .icon-btn {
      background:
        linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.04)),
        rgba(255,255,255,.075);
      color: var(--text);
      font-size: 13px;
      font-weight: 900;
      border: 1px solid rgba(255,255,255,.045);
    }

    .empty {
      padding: 28px 16px;
      border: 1px dashed rgba(255,255,255,.2);
      border-radius: 16px;
      text-align: center;
      color: var(--muted);
    }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: max(12px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 12;
      width: min(calc(100% - 24px), 500px);
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.035)),
        rgba(10,14,20,.84);
      backdrop-filter: blur(22px);
      box-shadow: 0 20px 70px rgba(0,0,0,.55);
    }

    .nav-btn {
      min-height: 46px;
      border: 0;
      border-radius: 14px;
      background: transparent;
      color: #d0d8e4;
      font-size: 12px;
      font-weight: 800;
    }

    .nav-btn.active {
      background:
        linear-gradient(180deg, rgba(255,255,255,.12), rgba(75,179,253,.16)),
        rgba(75,179,253,.18);
      color: var(--text);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
    }

    .fab {
      color: #061018;
      background: linear-gradient(135deg, var(--blue), #76c7ff);
      box-shadow: 0 10px 28px rgba(75,179,253,.28);
      position: relative;
      overflow: hidden;
    }

    dialog {
      width: min(calc(100% - 22px), 520px);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 0;
      color: var(--text);
      background: linear-gradient(180deg, #111923, #090e15);
      box-shadow: var(--shadow);
    }

    dialog::backdrop {
      background: rgba(0,0,0,.65);
      backdrop-filter: blur(3px);
    }

    form {
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .form-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .form-head h2 {
      margin: 0;
      font-size: 20px;
    }

    .x {
      width: 40px;
      height: 40px;
      border: 0;
      border-radius: 14px;
      background: rgba(255,255,255,.08);
      color: var(--text);
    }

    label {
      display: grid;
      gap: 6px;
      color: #d0d8e4;
      font-size: 12px;
      font-weight: 700;
    }

    input, select, textarea {
      width: 100%;
      min-height: 44px;
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 12px;
      background: rgba(255,255,255,.075);
      color: var(--text);
      padding: 10px 12px;
      outline: none;
    }

    textarea {
      min-height: 76px;
      resize: vertical;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .schedule-picker {
      display: grid;
      gap: 10px;
    }

    .segment {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .segment input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .segment span {
      display: grid;
      place-items: center;
      min-height: 40px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.13);
      background: rgba(255,255,255,.075);
      color: #d0d8e4;
      font-size: 13px;
      font-weight: 900;
    }

    .segment input:checked + span {
      background: linear-gradient(135deg, var(--blue), #76c7ff);
      color: #061018;
      border-color: transparent;
    }

    .save {
      min-height: 48px;
      border: 0;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--blue), #76c7ff);
      color: #061018;
      font-weight: 900;
    }

    .danger {
      background: rgba(255,102,120,.14);
      color: var(--red);
    }

    .settings-content {
      display: grid;
      gap: 14px;
      padding: 0 16px 16px;
    }

    .settings-head {
      padding: 16px 16px 0;
    }

    .settings-panel {
      display: grid;
      gap: 12px;
      padding: 14px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.035)),
        rgba(255,255,255,.045);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
    }

    .settings-panel h3 {
      margin: 0;
      font-size: 15px;
    }

    .settings-note {
      margin: 0;
      color: #cbd4e0;
      font-size: 12px;
      line-height: 1.7;
      font-weight: 650;
    }

    .settings-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
    }

    .soft-btn {
      min-height: 46px;
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 12px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.035)),
        rgba(255,255,255,.06);
      color: var(--text);
      font-weight: 900;
    }

    .soft-btn.accent {
      border-color: transparent;
      background: linear-gradient(135deg, var(--blue), #76c7ff);
      color: #061018;
      box-shadow: 0 10px 24px rgba(75,179,253,.18);
    }

    .settings-status {
      min-height: 20px;
      color: #9facbd;
      font-size: 11px;
      line-height: 1.6;
      font-weight: 700;
    }

    .secret-editor {
      display: grid;
      gap: 10px;
      padding: 13px;
      border: 1px solid rgba(97,244,222,.18);
      border-radius: 14px;
      background:
        linear-gradient(180deg, rgba(97,244,222,.08), rgba(255,255,255,.025)),
        rgba(255,255,255,.04);
    }

    .secret-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--text);
      font-size: 14px;
      font-weight: 900;
    }

    .secret-head small,
    .secret-note {
      color: #9facbd;
      font-size: 11px;
      line-height: 1.6;
      font-weight: 700;
    }

    .secret-clear {
      display: flex;
      align-items: center;
      grid-template-columns: none;
      gap: 8px;
      color: #ff9aa6;
    }

    .secret-clear input {
      width: 18px;
      min-height: 18px;
      accent-color: var(--red);
    }

    .secret-open {
      display: grid;
      place-items: center;
      min-height: 48px;
      border: 2px solid rgba(97,244,222,.9);
      border-radius: 12px;
      background:
        linear-gradient(180deg, rgba(18, 45, 62, .98), rgba(5, 14, 22, .98)),
        #07111a;
      color: #ffffff;
      font-size: 15px;
      font-weight: 950;
      text-shadow: 0 1px 8px rgba(0,0,0,.75);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.16),
        0 0 0 1px rgba(97,244,222,.18),
        0 12px 30px rgba(0,0,0,.38),
        0 0 22px rgba(97,244,222,.11);
    }

    .credential-body,
    .vault-body {
      padding: 0 16px 16px;
      display: grid;
      gap: 12px;
    }

    .credential-result {
      display: grid;
      gap: 10px;
      padding-top: 4px;
    }

    .secret-value {
      min-height: 44px;
      padding: 11px 12px;
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 12px;
      background: rgba(255,255,255,.075);
      color: var(--text);
      overflow-wrap: anywhere;
      font-size: 14px;
      font-weight: 800;
    }

    .vault-error {
      min-height: 18px;
      color: #ff9aa6;
      font-size: 12px;
      font-weight: 800;
    }


    @media (max-width: 520px) {
      .app { padding-inline: 12px; }
      .stats { grid-template-columns: 1fr 1fr 1fr; }
      .stat { padding: 11px 9px; }
      .stat span { font-size: 11px; }
      .stat strong { font-size: 22px; }
      .meta { grid-template-columns: 1fr; }
      .actions { grid-template-columns: 1fr 1fr; }
      .actions.result-mode { grid-template-columns: minmax(128px, 1fr) 58px 58px; }
      .icon-btn { min-height: 42px; }
      .card-main { padding: 15px; }
      .company h2 { font-size: 20px; }
      .deadline-card { align-items: flex-start; }
      .settings-actions { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div class="brand">
        <h1>NEXTROUND</h1>
        <p class="sub">インターンも本選考も、タップで進める。</p>
      </div>
      <div class="header-tools">
        <button class="settings-btn" type="button" id="settingsBtn">設定</button>
        <div class="today"><span>今日</span><strong id="dateLabel"></strong><small id="weekdayLabel"></small></div>
      </div>
    </header>

    <section class="stats" aria-label="進捗サマリー">
      <div class="stat stat-active"><span>進行中</span><strong id="activeCount">0</strong></div>
      <div class="stat stat-deadline"><span>締切間近</span><strong id="soonCount">0</strong></div>
      <div class="stat stat-win"><span>合格/内定</span><strong id="winCount">0</strong></div>
    </section>

    <section class="toolbar">
      <input id="search" class="search" type="search" placeholder="会社名・職種・メモで検索">
      <div id="chips" class="chips" aria-label="表示フィルター"></div>
    </section>

    <section id="deadlineStrip" class="deadline-strip" aria-label="締切"></section>
    <section id="cards" class="cards" aria-label="選考一覧"></section>
  </main>

  <nav class="bottom-nav" aria-label="主要操作">
    <button class="nav-btn active" data-filter="all">一覧</button>
    <button class="nav-btn" data-filter="deadline">締切</button>
    <button class="nav-btn fab" id="addBtn">＋ 追加</button>
  </nav>

  <dialog id="entryDialog">
    <form id="entryForm" method="dialog">
      <div class="form-head">
        <h2 id="formTitle">選考を追加</h2>
        <button class="x" type="button" id="closeDialog" aria-label="閉じる">×</button>
      </div>
      <label>会社名
        <input name="company" required placeholder="例: サイバーエージェント">
      </label>
      <div class="form-grid">
        <label>種類
          <select name="type">
            <option>インターン</option>
            <option>本選考</option>
            <option>説明会</option>
            <option>OB/OG訪問</option>
          </select>
        </label>
        <label>ステータス
          <select name="stage"></select>
        </label>
      </div>
      <label>職種/コース
        <input name="role" placeholder="例: 総合職 / エンジニア / 企画">
      </label>
      <div class="form-grid">
        <label>締切日
          <input name="deadline" type="date">
        </label>
        <label>次の予定日
          <input name="nextDate" type="date">
        </label>
      </div>
      <div id="internScheduleField" class="schedule-picker" hidden>
        <label>インターン日程</label>
        <div class="segment">
          <label><input type="radio" name="internScheduleMode" value="single" checked><span>1日</span></label>
          <label><input type="radio" name="internScheduleMode" value="range"><span>複数日</span></label>
        </div>
        <label id="internSingleField">実施日
          <input name="internSingleDate" type="date">
        </label>
        <div id="internRangeFields" class="form-grid" hidden>
          <label>開始日
            <input name="internStartDate" type="date">
          </label>
          <label>終了日
            <input name="internEndDate" type="date">
          </label>
        </div>
      </div>
      <label>メモ
        <textarea name="memo" placeholder="GDテーマ、ESで使う話、面接で聞かれそうなことなど"></textarea>
      </label>
      <section class="secret-editor">
        <div class="secret-head">
          <span>マイページ情報</span>
          <small>保護パスワードで暗号化</small>
        </div>
        <label>ログインURL
          <input name="portalUrl" type="url" inputmode="url" autocomplete="off" placeholder="https://...">
        </label>
        <div class="form-grid">
          <label>ID
            <input name="portalId" autocomplete="off" placeholder="マイページID">
          </label>
          <label>パスワード
            <input name="portalPassword" type="password" autocomplete="new-password" placeholder="パスワード">
          </label>
        </div>
        <label class="secret-clear" id="clearCredentialField" hidden>
          <input name="clearCredential" type="checkbox" value="1">
          保存済みのマイページ情報を削除
        </label>
        <div class="secret-note" id="credentialFormNote">入力した場合だけ、保護パスワードで暗号化して保存します。</div>
      </section>
      <button class="save" type="submit">保存</button>
      <button class="save danger" type="button" id="deleteBtn" hidden>削除</button>
    </form>
  </dialog>

  <dialog id="resultDialog">
    <form id="resultForm" method="dialog">
      <div class="form-head">
        <h2 id="resultTitle">結果を入力</h2>
        <button class="x" type="button" id="closeResultDialog" aria-label="閉じる">×</button>
      </div>
      <div id="resultScheduleField" class="schedule-picker" hidden>
        <label>合格時のインターン日程</label>
        <div class="segment">
          <label><input type="radio" name="resultScheduleMode" value="single" checked><span>1日</span></label>
          <label><input type="radio" name="resultScheduleMode" value="range"><span>複数日</span></label>
        </div>
        <label id="resultSingleField">実施日
          <input name="resultSingleDate" type="date">
        </label>
        <div id="resultRangeFields" class="form-grid" hidden>
          <label>開始日
            <input name="resultStartDate" type="date">
          </label>
          <label>終了日
            <input name="resultEndDate" type="date">
          </label>
        </div>
      </div>
      <button class="save" type="button" id="passResultBtn">合格</button>
      <button class="save danger" type="button" id="failResultBtn">不合格</button>
    </form>
  </dialog>

  <dialog id="credentialDialog">
    <div class="form-head settings-head">
      <h2 id="credentialTitle">マイページ情報</h2>
      <button class="x" type="button" id="closeCredentialDialog" aria-label="閉じる">×</button>
    </div>
    <div class="credential-body">
      <p class="settings-note">閲覧するには保護パスワードを入力してください。</p>
      <label>保護パスワード
        <input id="credentialPassword" type="password" autocomplete="current-password">
      </label>
      <button class="save" type="button" id="unlockCredentialBtn">表示する</button>
      <div class="vault-error" id="credentialError" aria-live="polite"></div>
      <div class="credential-result" id="credentialResult" hidden>
        <label>ログインURL
          <div class="secret-value" id="credentialUrl"></div>
        </label>
        <label>ID
          <div class="secret-value" id="credentialId"></div>
        </label>
        <label>パスワード
          <div class="secret-value" id="credentialPass"></div>
        </label>
      </div>
    </div>
  </dialog>

  <dialog id="vaultDialog">
    <div class="form-head settings-head">
      <h2 id="vaultTitle">保護パスワード</h2>
      <button class="x" type="button" id="closeVaultDialog" aria-label="閉じる">×</button>
    </div>
    <div class="vault-body">
      <p class="settings-note" id="vaultMessage"></p>
      <label>保護パスワード
        <input id="vaultPassword" type="password" autocomplete="new-password">
      </label>
      <label id="vaultConfirmField" hidden>もう一度入力
        <input id="vaultConfirmPassword" type="password" autocomplete="new-password">
      </label>
      <button class="save" type="button" id="vaultSubmitBtn">続ける</button>
      <div class="vault-error" id="vaultError" aria-live="polite"></div>
    </div>
  </dialog>

  <dialog id="settingsDialog">
    <div class="form-head settings-head">
      <h2>設定</h2>
      <button class="x" type="button" id="closeSettingsDialog" aria-label="閉じる">×</button>
    </div>
    <div class="settings-content">
      <section class="settings-panel">
        <h3>データ管理</h3>
        <p class="settings-note">データはこの端末に自動保存されます。端末変更やブラウザのサイトデータ削除に備えて、たまに保存しておくと安心です。</p>
        <div class="settings-actions">
          <button class="soft-btn accent" type="button" id="exportBtn">データを保存</button>
          <button class="soft-btn" type="button" id="importBtn">保存データを読み込む</button>
        </div>
        <p class="settings-note">保存したファイルには会社名やメモが含まれます。人に送らず、自分だけで保管してください。</p>
        <div class="settings-status" id="settingsStatus" aria-live="polite"></div>
        <input id="importFile" type="file" accept="application/json,.json" hidden>
      </section>
    </div>
  </dialog>

  <script>
    const stages = [
      "気になる",
      "応募予定",
      "書類選考中",
      "ES提出済",
      "Webテスト",
      "GD",
      "一次面接",
      "二次面接",
      "最終面接",
      "結果待ち",
      "インターン合格",
      "インターン不合格",
      "内定",
      "辞退",
      "不採用"
    ];

    const doneStages = new Set(["インターン合格", "インターン不合格", "内定", "辞退", "不採用"]);
    const winStages = new Set(["インターン合格", "内定"]);
    const stageColors = {
      "気になる": "#95a3b5",
      "応募予定": "#4bb3fd",
      "書類選考中": "#61f4de",
      "ES提出済": "#61f4de",
      "Webテスト": "#b79cff",
      "GD": "#ffcf5a",
      "一次面接": "#36d399",
      "二次面接": "#36d399",
      "最終面接": "#36d399",
      "結果待ち": "#ffcf5a",
      "インターン合格": "#36d399",
      "インターン不合格": "#ff6678",
      "内定": "#36d399",
      "辞退": "#95a3b5",
      "不採用": "#ff6678"
    };
    const storageKey = "senkou-deck-v1";
    const vaultStorageKey = "nextround-vault-v1";
    const textEncoder = new TextEncoder();
    const textDecoder = new TextDecoder();
    const seed = [
      {
        id: crypto.randomUUID(),
        company: "Blue Orbit",
        type: "インターン",
        role: "事業企画 3days",
        stage: "結果待ち",
        deadline: nextDate(3),
        nextDate: nextDate(6),
        internSchedule: "",
        internScheduleMode: "single",
        internSingleDate: "",
        internStartDate: "",
        internEndDate: "",
        memo: "GD終了。結果待ち。通ったら次は人事面談。"
      },
      {
        id: crypto.randomUUID(),
        company: "Nexa Bank",
        type: "本選考",
        role: "総合職",
        stage: "書類選考中",
        deadline: nextDate(1),
        nextDate: "",
        internSchedule: "",
        internScheduleMode: "single",
        internSingleDate: "",
        internStartDate: "",
        internEndDate: "",
        memo: "ES提出済。志望動機を面接用に短くする。"
      },
      {
        id: crypto.randomUUID(),
        company: "Sakura Systems",
        type: "インターン",
        role: "エンジニア",
        stage: "応募予定",
        deadline: nextDate(8),
        nextDate: "",
        internSchedule: "",
        internScheduleMode: "single",
        internSingleDate: "",
        internStartDate: "",
        internEndDate: "",
        memo: "締切前にポートフォリオURLを確認。"
      }
    ];

    let entries = load();
    let vaultConfig = loadVaultConfig();
    let activeFilter = "all";
    let editingId = null;
    let resultTargetId = null;
    let credentialTargetId = null;
    let vaultResolver = null;

    const cards = document.querySelector("#cards");
    const chips = document.querySelector("#chips");
    const deadlineStrip = document.querySelector("#deadlineStrip");
    const dialog = document.querySelector("#entryDialog");
    const form = document.querySelector("#entryForm");
    const stageSelect = form.elements.stage;
    const deleteBtn = document.querySelector("#deleteBtn");
    const internScheduleField = document.querySelector("#internScheduleField");
    const resultDialog = document.querySelector("#resultDialog");
    const resultForm = document.querySelector("#resultForm");
    const resultTitle = document.querySelector("#resultTitle");
    const resultScheduleField = document.querySelector("#resultScheduleField");
    const settingsDialog = document.querySelector("#settingsDialog");
    const settingsStatus = document.querySelector("#settingsStatus");
    const importFile = document.querySelector("#importFile");
    const clearCredentialField = document.querySelector("#clearCredentialField");
    const credentialFormNote = document.querySelector("#credentialFormNote");
    const credentialDialog = document.querySelector("#credentialDialog");
    const credentialTitle = document.querySelector("#credentialTitle");
    const credentialPassword = document.querySelector("#credentialPassword");
    const credentialError = document.querySelector("#credentialError");
    const credentialResult = document.querySelector("#credentialResult");
    const vaultDialog = document.querySelector("#vaultDialog");
    const vaultTitle = document.querySelector("#vaultTitle");
    const vaultMessage = document.querySelector("#vaultMessage");
    const vaultPassword = document.querySelector("#vaultPassword");
    const vaultConfirmField = document.querySelector("#vaultConfirmField");
    const vaultConfirmPassword = document.querySelector("#vaultConfirmPassword");
    const vaultError = document.querySelector("#vaultError");

    const now = new Date();
    document.querySelector("#dateLabel").textContent = `${now.getMonth() + 1}/${now.getDate()}`;
    document.querySelector("#weekdayLabel").textContent = new Intl.DateTimeFormat("ja-JP", { weekday: "short" }).format(now);
    stages.forEach(stage => stageSelect.add(new Option(stage, stage)));

    const filters = ["all", "インターン", "本選考", "書類選考中", "GD", "結果待ち", "面接", "合格"];
    const names = { all: "すべて", 面接: "面接中", 合格: "合格/内定" };
    filters.forEach(filter => {
      const button = document.createElement("button");
      button.className = "chip" + (filter === activeFilter ? " active" : "");
      button.textContent = names[filter] || filter;
      button.addEventListener("click", () => {
        activeFilter = filter;
        syncNav();
        render();
      });
      chips.append(button);
    });

    document.querySelector("#search").addEventListener("input", render);
    document.querySelector("#addBtn").addEventListener("click", () => openForm());
    document.querySelector("#closeDialog").addEventListener("click", () => dialog.close());
    document.querySelector("#closeResultDialog").addEventListener("click", () => resultDialog.close());
    document.querySelector("#passResultBtn").addEventListener("click", () => applyResult(true));
    document.querySelector("#failResultBtn").addEventListener("click", () => applyResult(false));
    document.querySelector("#settingsBtn").addEventListener("click", openSettings);
    document.querySelector("#closeSettingsDialog").addEventListener("click", () => settingsDialog.close());
    document.querySelector("#exportBtn").addEventListener("click", exportData);
    document.querySelector("#importBtn").addEventListener("click", () => importFile.click());
    importFile.addEventListener("change", importData);
    document.querySelector("#closeCredentialDialog").addEventListener("click", () => credentialDialog.close());
    document.querySelector("#unlockCredentialBtn").addEventListener("click", unlockCredential);
    document.querySelector("#closeVaultDialog").addEventListener("click", () => closeVaultRequest(null));
    document.querySelector("#vaultSubmitBtn").addEventListener("click", submitVaultPassword);
    vaultPassword.addEventListener("keydown", event => {
      if (event.key === "Enter") submitVaultPassword();
    });
    vaultConfirmPassword.addEventListener("keydown", event => {
      if (event.key === "Enter") submitVaultPassword();
    });
    credentialPassword.addEventListener("keydown", event => {
      if (event.key === "Enter") unlockCredential();
    });
    vaultDialog.addEventListener("cancel", event => {
      event.preventDefault();
      closeVaultRequest(null);
    });
    form.elements.type.addEventListener("change", updateInternScheduleVisibility);
    form.elements.stage.addEventListener("change", updateInternScheduleVisibility);
    Array.from(form.elements.internScheduleMode).forEach(input => {
      input.addEventListener("change", () => updateScheduleMode(form, "intern"));
    });
    Array.from(resultForm.elements.resultScheduleMode).forEach(input => {
      input.addEventListener("change", () => updateScheduleMode(resultForm, "result"));
    });
    document.querySelectorAll(".nav-btn[data-filter]").forEach(button => {
      button.addEventListener("click", () => {
        activeFilter = button.dataset.filter;
        syncNav();
        render();
      });
    });

    form.addEventListener("submit", async event => {
      event.preventDefault();
      const data = Object.fromEntries(new FormData(form).entries());
      const existingEntry = entries.find(entry => entry.id === editingId);
      let credentialVault;
      try {
        credentialVault = await buildCredentialVault(data, existingEntry);
      } catch (error) {
        if (error.message) credentialFormNote.textContent = error.message;
        return;
      }
      const item = {
        id: editingId || crypto.randomUUID(),
        company: data.company.trim(),
        type: data.type,
        role: data.role.trim(),
        stage: data.stage,
        deadline: data.deadline,
        nextDate: data.nextDate,
        internSchedule: buildScheduleFromForm(form, "intern", existingEntry?.internSchedule || ""),
        internScheduleMode: form.elements.internScheduleMode.value,
        internSingleDate: data.internSingleDate || "",
        internStartDate: data.internStartDate || "",
        internEndDate: data.internEndDate || "",
        memo: data.memo.trim(),
        credentialVault
      };
      entries = editingId
        ? entries.map(entry => entry.id === editingId ? item : entry)
        : [item, ...entries];
      save();
      dialog.close();
      render();
    });

    deleteBtn.addEventListener("click", () => {
      if (!editingId) return;
      entries = entries.filter(entry => entry.id !== editingId);
      save();
      dialog.close();
      render();
    });

    function load() {
      try {
        return (JSON.parse(localStorage.getItem(storageKey)) || seed).map(entry => ({
          internSchedule: "",
          internScheduleMode: "single",
          internSingleDate: "",
          internStartDate: "",
          internEndDate: "",
          credentialVault: null,
          ...entry
        }));
      } catch {
        return seed;
      }
    }

    function save() {
      localStorage.setItem(storageKey, JSON.stringify(entries));
    }

    function loadVaultConfig() {
      try {
        return JSON.parse(localStorage.getItem(vaultStorageKey)) || null;
      } catch {
        return null;
      }
    }

    function saveVaultConfig() {
      if (vaultConfig) localStorage.setItem(vaultStorageKey, JSON.stringify(vaultConfig));
      else localStorage.removeItem(vaultStorageKey);
    }

    function openSettings() {
      settingsStatus.textContent = "";
      settingsDialog.showModal();
    }

    function exportData() {
      const payload = {
        app: "NEXTROUND",
        version: 1,
        exportedAt: new Date().toISOString(),
        entries,
        vault: vaultConfig
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `nextround-save-${new Date().toISOString().slice(0, 10)}.json`;
      document.body.append(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      settingsStatus.textContent = "保存データを作成しました。iCloud Driveなど自分だけの場所に保管してください。";
    }

    function importData() {
      const file = importFile.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.addEventListener("load", () => {
        try {
          const parsed = JSON.parse(reader.result);
          const importedEntries = Array.isArray(parsed) ? parsed : parsed.entries;
          if (!Array.isArray(importedEntries)) throw new Error("invalid");
          if (entries.length && !confirm("今のデータを、選んだ保存データで置き換えます。よろしいですか？")) {
            importFile.value = "";
            return;
          }
          entries = importedEntries.map(normalizeEntry);
          vaultConfig = parsed.vault || null;
          saveVaultConfig();
          save();
          render();
          settingsStatus.textContent = "保存データを読み込みました。";
        } catch {
          settingsStatus.textContent = "読み込めませんでした。NEXTROUNDで保存したJSONファイルを選んでください。";
        } finally {
          importFile.value = "";
        }
      });
      reader.readAsText(file);
    }

    function normalizeEntry(entry) {
      return {
        id: entry.id || crypto.randomUUID(),
        company: entry.company || "",
        type: entry.type || "インターン",
        role: entry.role || "",
        stage: stages.includes(entry.stage) ? entry.stage : "応募予定",
        deadline: entry.deadline || "",
        nextDate: entry.nextDate || "",
        internSchedule: entry.internSchedule || "",
        internScheduleMode: entry.internScheduleMode || "single",
        internSingleDate: entry.internSingleDate || "",
        internStartDate: entry.internStartDate || "",
        internEndDate: entry.internEndDate || "",
        memo: entry.memo || "",
        credentialVault: entry.credentialVault || null
      };
    }

    function bytesToBase64(bytes) {
      let binary = "";
      bytes.forEach(byte => binary += String.fromCharCode(byte));
      return btoa(binary);
    }

    function base64ToBytes(value) {
      return Uint8Array.from(atob(value), char => char.charCodeAt(0));
    }

    function randomBase64(length) {
      const bytes = crypto.getRandomValues(new Uint8Array(length));
      return bytesToBase64(bytes);
    }

    async function deriveVaultKey(password, salt) {
      if (!crypto.subtle) throw new Error("このブラウザでは保護保存を使えません。");
      const baseKey = await crypto.subtle.importKey(
        "raw",
        textEncoder.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: base64ToBytes(salt), iterations: 180000, hash: "SHA-256" },
        baseKey,
        { name: "AES-GCM", length: 256 },
        false,
        ["encrypt", "decrypt"]
      );
    }

    async function encryptPayload(key, payload) {
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const encrypted = await crypto.subtle.encrypt(
        { name: "AES-GCM", iv },
        key,
        textEncoder.encode(JSON.stringify(payload))
      );
      return { iv: bytesToBase64(iv), data: bytesToBase64(new Uint8Array(encrypted)) };
    }

    async function decryptPayload(key, encrypted) {
      const plain = await crypto.subtle.decrypt(
        { name: "AES-GCM", iv: base64ToBytes(encrypted.iv) },
        key,
        base64ToBytes(encrypted.data)
      );
      return JSON.parse(textDecoder.decode(plain));
    }

    async function createVaultConfig(password) {
      const salt = randomBase64(16);
      const key = await deriveVaultKey(password, salt);
      const verifier = await encryptPayload(key, { app: "NEXTROUND", ok: true });
      return { version: 1, salt, verifier };
    }

    async function verifyVaultPassword(password) {
      if (!vaultConfig) return false;
      try {
        const key = await deriveVaultKey(password, vaultConfig.salt);
        const result = await decryptPayload(key, vaultConfig.verifier);
        return result?.ok === true;
      } catch {
        return false;
      }
    }

    async function requestVaultPassword({ title, message, create = false }) {
      vaultTitle.textContent = title;
      vaultMessage.textContent = message;
      vaultConfirmField.hidden = !create;
      vaultPassword.value = "";
      vaultConfirmPassword.value = "";
      vaultError.textContent = "";
      vaultDialog.showModal();
      setTimeout(() => vaultPassword.focus(), 0);
      return new Promise(resolve => {
        vaultResolver = resolve;
      });
    }

    function closeVaultRequest(value) {
      if (!vaultDialog.open) return;
      vaultDialog.close();
      const resolver = vaultResolver;
      vaultResolver = null;
      if (resolver) resolver(value);
    }

    function submitVaultPassword() {
      const password = vaultPassword.value;
      if (password.length < 4) {
        vaultError.textContent = "4文字以上で入力してください。";
        return;
      }
      if (!vaultConfirmField.hidden && password !== vaultConfirmPassword.value) {
        vaultError.textContent = "確認用の入力が一致していません。";
        return;
      }
      closeVaultRequest(password);
    }

    async function getVaultPasswordForSave() {
      if (!vaultConfig) {
        const password = await requestVaultPassword({
          title: "保護パスワードを設定",
          message: "マイページ情報を見る時に使うパスワードです。忘れると復元できません。",
          create: true
        });
        if (!password) throw new Error("マイページ情報の保存をキャンセルしました。");
        vaultConfig = await createVaultConfig(password);
        saveVaultConfig();
        return password;
      }
      const password = await requestVaultPassword({
        title: "保護パスワードを入力",
        message: "マイページ情報を暗号化して保存します。",
        create: false
      });
      if (!password) throw new Error("マイページ情報の保存をキャンセルしました。");
      if (!(await verifyVaultPassword(password))) throw new Error("保護パスワードが違います。");
      return password;
    }

    async function buildCredentialVault(data, existingEntry) {
      if (data.clearCredential === "1") return null;
      const credential = {
        url: (data.portalUrl || "").trim(),
        id: (data.portalId || "").trim(),
        password: data.portalPassword || ""
      };
      if (!credential.url && !credential.id && !credential.password) {
        return existingEntry?.credentialVault || null;
      }
      const password = await getVaultPasswordForSave();
      const key = await deriveVaultKey(password, vaultConfig.salt);
      return { version: 1, ...(await encryptPayload(key, credential)) };
    }

    async function decryptCredential(vault, password) {
      const key = await deriveVaultKey(password, vaultConfig.salt);
      return decryptPayload(key, vault);
    }

    function nextDate(days) {
      const date = new Date();
      date.setDate(date.getDate() + days);
      return date.toISOString().slice(0, 10);
    }

    function daysLeft(value) {
      if (!value) return null;
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const target = new Date(value + "T00:00:00");
      return Math.round((target - today) / 86400000);
    }

    function formatDate(value) {
      if (!value) return "未設定";
      const date = new Date(value + "T00:00:00");
      return `${date.getMonth() + 1}/${date.getDate()}`;
    }

    function formatScheduleDate(value) {
      if (!value) return "";
      const date = new Date(value + "T00:00:00");
      return `${date.getMonth() + 1}/${date.getDate()}`;
    }

    function buildScheduleFromForm(targetForm, prefix, fallback = "") {
      const mode = targetForm.elements[`${prefix}ScheduleMode`].value;
      if (mode === "single") {
        return formatScheduleDate(targetForm.elements[`${prefix}SingleDate`].value) || fallback;
      }
      const start = formatScheduleDate(targetForm.elements[`${prefix}StartDate`].value);
      const end = formatScheduleDate(targetForm.elements[`${prefix}EndDate`].value);
      if (start && end) return `${start}〜${end}`;
      return start || end || fallback;
    }

    function setScheduleForm(targetForm, prefix, entry = {}) {
      const mode = entry.internScheduleMode || "single";
      targetForm.elements[`${prefix}ScheduleMode`].value = mode;
      targetForm.elements[`${prefix}SingleDate`].value = entry.internSingleDate || "";
      targetForm.elements[`${prefix}StartDate`].value = entry.internStartDate || "";
      targetForm.elements[`${prefix}EndDate`].value = entry.internEndDate || "";
      updateScheduleMode(targetForm, prefix);
    }

    function updateScheduleMode(targetForm, prefix) {
      const mode = targetForm.elements[`${prefix}ScheduleMode`].value;
      document.querySelector(`#${prefix}SingleField`).hidden = mode !== "single";
      document.querySelector(`#${prefix}RangeFields`).hidden = mode !== "range";
    }

    function deadlineText(entry) {
      const left = daysLeft(entry.deadline);
      if (left === null) return "締切なし";
      if (left < 0) return `${Math.abs(left)}日超過`;
      if (left === 0) return "今日締切";
      return `あと${left}日`;
    }

    function deadlineLevel(entry) {
      const left = daysLeft(entry.deadline);
      if (left === null || left < 0 || doneStages.has(entry.stage)) return "";
      if (left <= 1) return "critical";
      if (left <= 7) return "soon";
      return "";
    }

    function isDeadlineNear(entry) {
      return Boolean(deadlineLevel(entry));
    }

    function deadlineClassName(entry) {
      const level = deadlineLevel(entry);
      return level ? `deadline-${level}` : "";
    }

    function deadlineMetaClass(entry) {
      const level = deadlineLevel(entry);
      if (level === "critical") return " urgent";
      if (level === "soon") return " soon";
      return "";
    }

    function countdownClass(entry) {
      const level = deadlineLevel(entry);
      if (level === "critical") return "danger";
      if (level === "soon") return "warning";
      return "";
    }

    function deadlineRank(entry) {
      const left = daysLeft(entry.deadline);
      if (isDeadlineNear(entry)) return -100 + left;
      if (left === null) return 9999;
      if (left < 0) return 9000 + Math.abs(left);
      return left;
    }

    function stageProgress(stage) {
      const index = Math.max(0, stages.indexOf(stage));
      return Math.round((index / (stages.length - 1)) * 100);
    }

    function filteredEntries() {
      const word = document.querySelector("#search").value.trim().toLowerCase();
      return entries
        .filter(entry => {
          if (activeFilter === "deadline") return daysLeft(entry.deadline) !== null;
          if (activeFilter === "all") return true;
          if (activeFilter === "面接") return entry.stage.includes("面接");
          if (activeFilter === "合格") return winStages.has(entry.stage);
          if (["書類選考中", "GD", "結果待ち"].includes(activeFilter)) return entry.stage === activeFilter;
          return entry.type === activeFilter;
        })
        .filter(entry => !word || [entry.company, entry.role, entry.stage, entry.memo, entry.internSchedule].join(" ").toLowerCase().includes(word))
        .sort((a, b) => {
          const rankDiff = deadlineRank(a) - deadlineRank(b);
          if (rankDiff !== 0) return rankDiff;
          return a.company.localeCompare(b.company, "ja");
        });
    }

    function render() {
      const visible = filteredEntries();
      cards.innerHTML = "";
      deadlineStrip.innerHTML = "";

      document.querySelector("#activeCount").textContent = entries.filter(entry => !doneStages.has(entry.stage)).length;
      document.querySelector("#soonCount").textContent = entries.filter(entry => {
        const left = daysLeft(entry.deadline);
        return left !== null && left <= 7 && left >= 0 && !doneStages.has(entry.stage);
      }).length;
      document.querySelector("#winCount").textContent = entries.filter(entry => winStages.has(entry.stage)).length;

      entries
        .filter(isDeadlineNear)
        .sort((a, b) => daysLeft(a.deadline) - daysLeft(b.deadline))
        .slice(0, 3)
        .forEach(entry => {
          const row = document.createElement("article");
          row.className = `deadline-card ${deadlineClassName(entry)}`;
          row.innerHTML = `<b>${escapeHtml(entry.company)} / ${escapeHtml(entry.stage)}</b><span>${deadlineText(entry)}</span>`;
          deadlineStrip.append(row);
        });

      if (!visible.length) {
        cards.innerHTML = `<div class="empty">まだ表示できる選考がありません。下の追加ボタンから入れられます。</div>`;
        paintFilters();
        return;
      }

      visible.forEach(entry => cards.append(createCard(entry)));
      paintFilters();
    }

    function createCard(entry) {
      const card = document.createElement("article");
      card.className = `card${winStages.has(entry.stage) ? " win" : ""}${deadlineClassName(entry) ? ` ${deadlineClassName(entry)}` : ""}`;
      const progress = stageProgress(entry.stage);
      const stageColor = stageColors[entry.stage] || stageColors["応募予定"];
      const deadlineClass = deadlineMetaClass(entry);
      const primaryStage = getPrimaryStage(entry);
      const done = doneStages.has(entry.stage) || entry.stage === stages.at(-1);
      const resultMode = entry.stage === "結果待ち";
      card.style.setProperty("--stage-color", stageColor);
      card.innerHTML = `
        <div class="card-main">
          <div class="topline">
            <div class="company">
              <h2>${escapeHtml(entry.company)}</h2>
              <p>${escapeHtml(entry.role || "職種未設定")}</p>
            </div>
            <span class="type">${escapeHtml(entry.type)}</span>
          </div>
          <div class="stage-row">
            <span class="status-pill">${escapeHtml(entry.stage)}</span>
            <div class="stage-label"><strong>${escapeHtml(statusHint(entry))}</strong><span>${progress}%</span></div>
            <div class="track"><div class="bar" style="width:${progress}%"></div></div>
          </div>
          ${entry.stage === "インターン合格" ? internshipScheduleMarkup(entry) : deadlineMetaMarkup(entry, deadlineClass)}
          <div class="meta-box"><span>メモ</span><b>${escapeHtml(entry.memo || "メモなし")}</b></div>
          ${entry.credentialVault ? `<button class="secret-open" data-action="credential" type="button">マイページ情報を表示</button>` : ""}
        </div>
        <div class="actions ${resultMode ? "result-mode" : ""}">
          <button class="primary ${done ? "done" : ""}" data-action="advance">${done ? "完了済み" : escapeHtml(resultMode ? "結果を入力" : primaryLabel(entry, primaryStage))}</button>
          ${resultMode ? "" : `<button class="quick" data-action="wait">結果待ち</button>`}
          <button class="icon-btn" data-action="edit" aria-label="編集">編集</button>
          <button class="icon-btn" data-action="back" aria-label="戻る">戻る</button>
        </div>
      `;
      card.querySelector('[data-action="advance"]').addEventListener("click", () => {
        if (resultMode) openResultDialog(entry);
        else advance(entry.id, 1);
      });
      const waitButton = card.querySelector('[data-action="wait"]');
      if (waitButton) waitButton.addEventListener("click", () => setStage(entry.id, "結果待ち"));
      const credentialButton = card.querySelector('[data-action="credential"]');
      if (credentialButton) credentialButton.addEventListener("click", () => openCredentialDialog(entry));
      card.querySelector('[data-action="back"]').addEventListener("click", () => advance(entry.id, -1));
      card.querySelector('[data-action="edit"]').addEventListener("click", () => openForm(entry));
      return card;
    }

    function openCredentialDialog(entry) {
      credentialTargetId = entry.id;
      credentialTitle.textContent = `${entry.company} のマイページ情報`;
      credentialPassword.value = "";
      credentialError.textContent = "";
      credentialResult.hidden = true;
      document.querySelector("#credentialUrl").textContent = "";
      document.querySelector("#credentialId").textContent = "";
      document.querySelector("#credentialPass").textContent = "";
      credentialDialog.showModal();
      setTimeout(() => credentialPassword.focus(), 0);
    }

    async function unlockCredential() {
      const entry = entries.find(item => item.id === credentialTargetId);
      if (!entry?.credentialVault) return;
      credentialError.textContent = "";
      try {
        if (!vaultConfig) throw new Error("保護設定が見つかりません。保存データを読み込んだ場合は、対応する保存ファイルが必要です。");
        const credential = await decryptCredential(entry.credentialVault, credentialPassword.value);
        document.querySelector("#credentialUrl").textContent = credential.url || "未設定";
        document.querySelector("#credentialId").textContent = credential.id || "未設定";
        document.querySelector("#credentialPass").textContent = credential.password || "未設定";
        credentialResult.hidden = false;
      } catch (error) {
        credentialResult.hidden = true;
        credentialError.textContent = error.message?.includes("保護設定") ? error.message : "保護パスワードが違います。";
      }
    }

    function deadlineMetaMarkup(entry, deadlineClass) {
      return `
        <div class="meta">
          <div class="meta-box${deadlineClass}"><span>締切</span><b>${formatDate(entry.deadline)}</b><em class="countdown ${countdownClass(entry)}">${deadlineText(entry)}</em></div>
          <div class="meta-box"><span>次の予定</span><b>${formatDate(entry.nextDate)}</b></div>
        </div>
      `;
    }

    function internshipScheduleMarkup(entry) {
      return `<div class="meta-box schedule-box"><span>インターン日程</span><b>${escapeHtml(entry.internSchedule || "未設定（編集から追加）")}</b></div>`;
    }

    function getPrimaryStage(entry) {
      if (doneStages.has(entry.stage)) return entry.stage;
      if (entry.stage === "結果待ち") return entry.type === "インターン" ? "インターン合格" : "内定";
      return stages[Math.min(stages.indexOf(entry.stage) + 1, stages.indexOf("結果待ち"))];
    }

    function getQuickStage(entry) {
      if (entry.stage === "結果待ち") return entry.type === "インターン" ? "インターン不合格" : "不採用";
      return "結果待ち";
    }

    function primaryLabel(entry, stage) {
      if (entry.stage === "結果待ち") return `結果: ${stage}`;
      return `次へ: ${stage}`;
    }

    function quickLabel(entry, stage) {
      if (entry.stage === "結果待ち") return `結果: ${stage}`;
      return "結果待ち";
    }

    function statusHint(entry) {
      if (entry.stage === "結果待ち") return "返事が来たら結果入力";
      if (entry.stage === "インターン合格") return "インターン日程を確認";
      if (winStages.has(entry.stage)) return "おめでとう、通過";
      if (["インターン不合格", "不採用"].includes(entry.stage)) return "記録済み";
      return "次のステップへ";
    }

    function advance(id, direction) {
      entries = entries.map(entry => {
        if (entry.id !== id) return entry;
        const current = stages.indexOf(entry.stage);
        const next = direction > 0
          ? stages.indexOf(getPrimaryStage(entry))
          : Math.max(0, current - 1);
        const nextStage = stages[next];
        return { ...entry, stage: nextStage };
      });
      save();
      render();
    }

    function setStage(id, stage, extras = {}) {
      entries = entries.map(entry => entry.id === id ? { ...entry, stage, ...extras } : entry);
      save();
      render();
    }

    function openResultDialog(entry) {
      resultTargetId = entry.id;
      resultForm.reset();
      resultTitle.textContent = `${entry.company} の結果`;
      resultScheduleField.hidden = entry.type !== "インターン";
      setScheduleForm(resultForm, "result", entry);
      document.querySelector("#passResultBtn").textContent = entry.type === "インターン" ? "インターン合格" : "内定";
      document.querySelector("#failResultBtn").textContent = entry.type === "インターン" ? "インターン不合格" : "不採用";
      resultDialog.showModal();
    }

    function applyResult(passed) {
      const entry = entries.find(item => item.id === resultTargetId);
      if (!entry) return;
      const stage = passed
        ? (entry.type === "インターン" ? "インターン合格" : "内定")
        : (entry.type === "インターン" ? "インターン不合格" : "不採用");
      const extras = {};
      if (stage === "インターン合格") {
        extras.internSchedule = buildScheduleFromForm(resultForm, "result", entry.internSchedule || "");
        extras.internScheduleMode = resultForm.elements.resultScheduleMode.value;
        extras.internSingleDate = resultForm.elements.resultSingleDate.value;
        extras.internStartDate = resultForm.elements.resultStartDate.value;
        extras.internEndDate = resultForm.elements.resultEndDate.value;
      }
      setStage(entry.id, stage, extras);
      resultDialog.close();
    }

    function openForm(entry) {
      editingId = entry?.id || null;
      document.querySelector("#formTitle").textContent = editingId ? "選考を編集" : "選考を追加";
      deleteBtn.hidden = !editingId;
      form.reset();
      form.elements.company.value = entry?.company || "";
      form.elements.type.value = entry?.type || "インターン";
      form.elements.stage.value = entry?.stage || "応募予定";
      form.elements.role.value = entry?.role || "";
      form.elements.deadline.value = entry?.deadline || "";
      form.elements.nextDate.value = entry?.nextDate || "";
      setScheduleForm(form, "intern", entry || {});
      form.elements.memo.value = entry?.memo || "";
      form.elements.portalUrl.value = "";
      form.elements.portalId.value = "";
      form.elements.portalPassword.value = "";
      form.elements.clearCredential.checked = false;
      clearCredentialField.hidden = !entry?.credentialVault;
      credentialFormNote.textContent = entry?.credentialVault
        ? "保存済みです。変更する時だけ新しい情報を入力してください。"
        : "入力した場合だけ、保護パスワードで暗号化して保存します。";
      updateInternScheduleVisibility();
      dialog.showModal();
    }

    function updateInternScheduleVisibility() {
      internScheduleField.hidden = !(form.elements.type.value === "インターン" && form.elements.stage.value === "インターン合格");
    }

    function paintFilters() {
      [...chips.children].forEach(button => {
        const label = button.textContent;
        const filter = Object.entries(names).find(([, value]) => value === label)?.[0] || label;
        button.classList.toggle("active", filter === activeFilter);
      });
      syncNav();
    }

    function syncNav() {
      document.querySelectorAll(".nav-btn[data-filter]").forEach(button => {
        button.classList.toggle("active", button.dataset.filter === activeFilter);
      });
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      })[char]);
    }

    render();
  </script>
</body>
</html>
